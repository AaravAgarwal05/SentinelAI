apiVersion: v1
kind: Service

metadata:
  name: rabbitmq
  namespace: messaging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: sentinelai

spec:
  selector:
    app.kubernetes.io/name: rabbitmq

  ports:
    - name: amqp
      port: 5672
      targetPort: 5672

    - name: management
      port: 15672
      targetPort: 15672

  type: ClusterIP
