apiVersion: apps/v1
kind: Deployment

metadata:
  name: grafana
  namespace: monitoring

  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: sentinelai

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: grafana

  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana

    spec:
      containers:
        - name: grafana

          image: grafana/grafana:11.1.0

          ports:
            - containerPort: 3000

          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin

            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin123

          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-pvc