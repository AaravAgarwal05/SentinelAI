apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: promtail
  namespace: logging
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: sentinelai

spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail

  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail

    spec:
      serviceAccountName: promtail

      containers:
        - name: promtail

          image: grafana/promtail:3.0.0

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          args:
            - -config.file=/etc/promtail/promtail.yaml
            - -config.expand-env=true

          volumeMounts:
            - name: config
              mountPath: /etc/promtail

            - name: varlog
              mountPath: /var/log

            - name: positions
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: promtail-config

        - name: varlog
          hostPath:
            path: /var/log

        - name: positions
          emptyDir: {}