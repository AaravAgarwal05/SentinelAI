apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: prometheus-pvc
  namespace: monitoring

  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: sentinelai

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 5Gi