apiVersion: apps/v1
kind: Deployment

metadata:
  name: loki
  namespace: logging

  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: sentinelai

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: loki

  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki

    spec:
      containers:
        - name: loki

          image: grafana/loki:3.0.0

          args:
            - -config.file=/etc/loki/loki.yaml

          ports:
            - containerPort: 3100

          volumeMounts:
            - name: config
              mountPath: /etc/loki

            - name: storage
              mountPath: /loki

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: config
          configMap:
            name: loki-config

        - name: storage
          persistentVolumeClaim:
            claimName: loki-pvc