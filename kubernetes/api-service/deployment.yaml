apiVersion: apps/v1
kind: Deployment

metadata:
  name: sentinel-api

  labels:
   app: sentinel-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sentinel-api

  template:

    metadata:
      labels:
        app: sentinel-api

    spec:

      containers:
        - name: sentinel-api

          image: sentinel-api:v1

          imagePullPolicy: Never

          ports:
            - containerPort: 8000
