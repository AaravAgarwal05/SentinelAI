apiVersion: apps/v1
kind: Deployment

metadata:
  name: sentinel-api
  namespace: sentinel
  labels:
    app.kubernetes.io/name: sentinel-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sentinelai

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: sentinel-api

  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel-api

    spec:
      containers:
        - name: sentinel-api

          image: sentinel-api:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          envFrom:
            - secretRef:
                name: sentinel-env