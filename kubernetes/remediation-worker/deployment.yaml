apiVersion: apps/v1
kind: Deployment

metadata:
  name: sentinel-remediation-worker
  namespace: sentinel
  labels:
    app.kubernetes.io/name: sentinel-remediation-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: sentinelai

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: sentinel-remediation-worker

  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel-remediation-worker

    spec:
      containers:
        - name: sentinel-remediation-worker

          image: sentinel-remediation-worker:latest
          imagePullPolicy: Never

          envFrom:
            - secretRef:
                name: sentinel-env